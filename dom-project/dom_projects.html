<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dom Projects</title>
    <style>
        .js-subscribe-button {
            margin: 5px;
            border:none;
            color: white;
            background-color: black;
            padding-top: 10px;
            padding-bottom: 10px;
            padding-left: 15px;
            padding-right: 15px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            margin: 30px;
        }
        .is-subscribed {
            color: black;
            background-color: rgb(240, 240, 240 );
        }
        body{
            font-family: Arial, Helvetica, sans-serif;
        }
        .js-cost-input{
            font-size: 15px;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid black;
        }
        .calculate-button{
            font-size: 15px;
            padding: 10px;
            border-radius: 5px;
            border: none;
            cursor: pointer;
            background-color: green;
            color:white;
        }
    </style>
</head>

<body>

    <p>YouTube Subscribe Button</p>
    <button onclick="
    subscribe();
    " class="js-subscribe-button">Subscribe</button>

    <p>Amazon Shipping Calculator</p>
    <p>Orders under $40 = +$10 shipping</p>
    <p>Orders over $40 = FREE shipping</p>
    <input placeholder="Cost of your order" class="js-cost-input" onkeydown="
    if (event.key=== 'Enter'){
        calculateTotal();
    }
    ">
    <button class="calculate-button" onclick="
    calculateTotal();
    ">Calculate</button>
    <p class="js-total-cost"></p>




    <script>

        function calculateTotal() {
            const inputElement = document.querySelector('.js-cost-input');
            let cost = Number(inputElement.value);

            if (cost < 40) {
                cost = cost + 10;
            }
            document.querySelector('.js-total-cost')
                .innerHTML = `Total Cost: $${cost}`;

        }
        function subscribe() {
            const buttonElement = document.querySelector('.js-subscribe-button');

            if (buttonElement.innerText === 'Subscribe') {
                buttonElement.innerHTML = 'Subscribed';
                buttonElement.classList.add('is-subscribed');
            }
            else {
                buttonElement.innerHTML = 'Subscribe';
                buttonElement.classList.remove('is-subscribed');
            }

        }
    </script>
</body>

</html>
